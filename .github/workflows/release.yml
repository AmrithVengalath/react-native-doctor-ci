name: Release

# Publishes to npm with provenance when a semver tag is pushed. Never runs on
# pull requests.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest # trusted publishing needs npm CLI >= 11.5.1

      - name: Publish to npm
        # Trusted Publishing (OIDC) - no token. Requires a Trusted Publisher
        # configured on npmjs.com for this repo/workflow/environment, and
        # `id-token: write` above. pnpm 11's OIDC publish path is currently
        # broken (pnpm/pnpm#11513), so this step uses npm directly.
        run: npm publish --provenance
