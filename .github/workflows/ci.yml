name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # pnpm 11 needs Node >= 22.13, so the full toolchain gate runs on
        # 22/24; Node 20 runtime support is covered by the node20-smoke job.
        node: [22, 24]
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Publish dry run
        run: pnpm publish --dry-run --no-git-checks

      - name: Pack tarball for the Node 20 smoke test
        if: matrix.node == 22
        run: pnpm pack --out rn-doctor.tgz

      - name: Upload tarball for the Node 20 smoke test
        if: matrix.node == 22
        uses: actions/upload-artifact@v7
        with:
          name: tarball
          path: rn-doctor.tgz

  node20-smoke:
    # engines.node is >= 20: the dev toolchain can't run there (pnpm 11
    # requires >= 22.13), but the shipped package must. Install the real
    # tarball with Node 20's npm and run the CLI, exactly like a consumer.
    name: Node 20 smoke (packed CLI)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Download tarball
        uses: actions/download-artifact@v8
        with:
          name: tarball

      - name: Install and run the packed CLI on Node 20
        run: |
          node --version
          mkdir smoke && cd smoke
          printf '{"name":"smoke","private":true,"dependencies":{}}' > package.json
          npm install --no-save ../rn-doctor.tgz
          ./node_modules/.bin/rn-doctor --version
          ./node_modules/.bin/rn-doctor --help
          ./node_modules/.bin/rn-doctor
